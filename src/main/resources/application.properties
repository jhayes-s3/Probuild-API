spring.application.name=MavenDemo2
server.port=8081

# Switch H2 from in-memory to file-based persistence
spring.datasource.url=jdbc:h2:file:./data/probuilddb;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Optional: keep the H2 console accessible at /h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console